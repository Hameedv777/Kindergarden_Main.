services:
  - type: web
    name: kindergarden-main
    runtime: python
    buildCommand: python -m pip install -r requirements.txt
    startCommand: gunicorn MUN.wsgi:application
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: kindergarden-main.onrender.com
