
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f8ff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .welcome-card {
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #a3cfff;
        }

        .dashboard-btn {
            padding: 20px;
            font-size: 1.1rem;
        }

        .header-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container mt-3">

        <!-- Header with Logout -->
        <div class="header-bar">
            <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
        </div>

        <!-- Welcome Card -->
        <div class="card welcome-card shadow-sm mb-4 text-center">
            <div class="card-body">
                <h3 class="card-title">Welcome, {{ name }}</h3>
                <p class="text-muted">Parent Panel</p>
            </div>
        </div>

        <!-- Dashboard Buttons -->
        <div class="row g-3">
            <div class="col-md-4">
                <a href="{% url 'parent_child' %}" class="btn btn-primary w-100 dashboard-btn">
                    View Child Details
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'parent_homework' %}" class="btn btn-warning w-100 dashboard-btn">
                    View Homework
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'parent_fees' %}" class="btn btn-info w-100 dashboard-btn">
                    View & Pay Fees
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'parent_attendance' %}" class="btn btn-success w-100 dashboard-btn">
                    Attendance Records
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% include "footer.html" %}
</body>

</html>
