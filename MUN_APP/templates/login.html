<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login | School Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

.login-container{
width:900px;
background:white;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
overflow:hidden;
}

.login-left{
background:linear-gradient(135deg,#4e73df,#224abe);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.login-left h2{
font-weight:bold;
}

.login-right{
padding:50px;
}

.form-control{
border-radius:8px;
}

.login-btn{
background:#4e73df;
border:none;
}

.login-btn:hover{
background:#2e59d9;
}

</style>

</head>

<body>

<div class="login-container">

<div class="row g-0">

<!-- Left Side -->
<div class="col-md-6 login-left">

<h2>Login To MUN Sytem</h2>

<p class="mt-3 text-center">
Manage Students, Attendance,<br>
Homework and Fees easily.
</p>

</div>


<!-- Right Side -->
<div class="col-md-6 login-right">

<h3 class="mb-4 text-center">Login</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn login-btn text-white w-100">
Login
</button>

</form>

{% if messages %}
{% for message in messages %}
<p class="text-danger mt-3 text-center">{{ message }}</p>
{% endfor %}
{% endif %}

<div class="text-center mt-3">
<a href="/" class="text-decoration-none">← Back to Home</a>
</div>

</div>

</div>

</div>

</body>
</html>
