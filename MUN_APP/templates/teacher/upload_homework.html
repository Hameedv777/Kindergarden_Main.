

<!DOCTYPE html>
<html>
<head>
    <title>Upload Homework</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Upload Homework</h4>
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Class -->
                        <div class="mb-3">
                            <label class="form-label">Select Class</label>
                            <select name="class_id" class="form-select" required>
                                <option value="">Select Class</option>
                                {% for c in classes %}
                                <option value="{{ c.id }}">
                                    {{ c.class_name }} - {{ c.section }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Homework Title -->
                        <div class="mb-3">
                            <label class="form-label">Homework Title</label>
                            <input type="text" name="title" class="form-control"
                                   placeholder="Homework Title" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label">Homework Details</label>
                            <textarea name="description" class="form-control"
                                      rows="4" placeholder="Homework Details" required></textarea>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">
                                Upload Homework
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>
{% include "footer.html" %}

</body>
</html>
