<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">

    <!-- Page Title -->
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">All Students</h2>
        <p class="text-muted">List of all registered students</p>
    </div>

    <!-- Card -->
    <div class="card shadow-lg border-0 rounded-3">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Student Records</h5>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover table-striped table-bordered align-middle text-center">

                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Admission No</th>
                            <th>Class</th>
                            <th>Parent</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for s in students %}
                        <tr>
                            <td>
                                <a href="{% url 'student_detail' s.id %}" 
                                   class="text-decoration-none fw-semibold text-primary">
                                   {{ s.full_name }}
                                </a>
                            </td>
                            <td>{{ s.admission_no }}</td>
                            <td>
                                <span class="badge bg-info text-dark">
                                    {{ s.class_section }}
                                </span>
                            </td>
                            <td>{{ s.parent.fName }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-muted text-center p-4">
                                No students available
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

{% include "footer.html" %}
