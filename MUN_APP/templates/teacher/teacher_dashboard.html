<!DOCTYPE html>
<html>

<head>
    <title>Teacher Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">Teacher Dashboard</span>

            <div class="ms-auto">
                <a class="btn btn-light btn-sm" href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5">

        <!-- Welcome Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <h3 class="card-title">Welcome, {{ name }}</h3>
                <p class="text-muted">Teacher Panel</p>
            </div>
        </div>

        <!-- Dashboard Buttons -->
        <div class="row g-3">

            <div class="col-md-4">
                <a href="{% url 'teacher_view_students' %}" class="btn btn-primary w-100 p-3">
                    View Students
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'attendance_select' %}" class="btn btn-success w-100 p-3">
                    Take Attendance
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'upload_homework' %}" class="btn btn-warning w-100 p-3">
                    Upload Homework
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'add_fee' %}" class="btn btn-info w-100 p-3">
                    Add Fee
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'add_student' %}" class="btn btn-dark w-100 p-3">
                    Add Student
                </a>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
{% include "footer.html" %}

</html>
